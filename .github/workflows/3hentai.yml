name: 3hentai test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: 3hentai test
        run: bun run test:3hentai
