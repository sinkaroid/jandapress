name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build project
        run: bun run build

      - name: Create playground directory
        run: mkdir -p dist

      - name: Generate OpenAPI spec
        run: |
          bun --eval "
          import { openAPISpec } from './build/src/lib/openapi-spec.js';
          console.log(JSON.stringify(openAPISpec, null, 2));
          " > dist/openapi.json

      - name: Create playground HTML
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>JandaPress API - Playground</title>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@scalar/themes@latest/style.css">
            </head>
            <body>
              <script id="api-reference" data-url="./openapi.json"></script>
              <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
            </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
